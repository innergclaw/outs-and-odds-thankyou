<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome — Outs and Odds</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: #0a0a0a;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  text-align: center;
  padding: 48px 32px;
  max-width: 480px;
}
.check {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #059669, #10b981);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 28px;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(16,185,129,0.3);
}
h1 { font-size: 28px; margin-bottom: 12px; }
p { color: #888; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
.btn {
  display: inline-block;
  padding: 16px 40px;
  background: #5865F2;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  transition: all 0.3s ease;
}
.btn:hover { background: #4752c4; transform: translateY(-2px); }
.sub { margin-top: 20px; font-size: 13px; color: #555; }
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1>Payment Confirmed</h1>
  <p>You're in. Welcome to Outs and Odds.</p>
  <a href="https://discord.gg/Y2xw5JTbEW" class="btn">Join the Discord →</a>
  <p class="sub">Don't lose this link — bookmark it now.</p>
</div>
</body>
</html>
